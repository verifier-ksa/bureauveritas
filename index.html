<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certificate Verification</title>
<link rel="stylesheet" href="./style.css">
</head>

<body>

<!-- SEARCH PAGE -->
<div id="search-section" class="page">
    <div class="search-card">
        <h3>Please search your e-document by filling the document number.</h3>

        <input type="text" id="cert-number" placeholder="e.g. 148-2026-022489-EN">

        <button class="search-btn" onclick="verifyCertificate()">Search Certificate</button>
    </div>

    <div class="footer">
        Visit <b>Bureau Veritas Website</b>
    </div>
</div>

<!-- RESULT PAGE -->
<div id="result-section" class="page hidden">
    <div class="result-card">
        <div class="status-circle">✔</div>
        <div id="result-data"></div>
    </div>

    <div class="footer">
        Visit <b>Bureau Veritas Website</b>
    </div>
</div>

<script src="./script.js"></script>
</body>
</html>
