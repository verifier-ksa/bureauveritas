<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verifier</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    height: 100vh;
    overflow-y: auto;
    background: url('Background.png') no-repeat center top;
    background-size: cover;
}

/* CENTER */
.content-view {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding-top: 130px;
    padding-bottom: 10px;
}

/* SEARCH */
.search-card {
    background: white;
    padding: 25px;
    border-radius: 15px;
    width: 90%;
    max-width: 380px;
    text-align: center;
}

.search-card input {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    border: 1px solid #ccc;
    border-radius: 5px;
}

.search-btn {
    margin-top: 15px;
    width: 100%;
    padding: 12px;
    background: #002195;
    color: white;
    border: none;
    border-radius: 5px;
    font-weight: bold;
}

/* RESULT CARD */
.result-card {
    background: #e6e6e6;
    width: 94%;
    max-width: 420px;
    border-radius: 25px;
    overflow: hidden;
}

.top-area {
    background: linear-gradient(to bottom, #9e9e9e, #cfcfcf);
    padding: 20px 0;
    text-align: center;
}

.status-circle {
    width: 60px;
    height: 60px;
    background: #4CAF50;
    color: white;
    border-radius: 50%;
    line-height: 60px;
    font-size: 28px;
    margin: auto;
    box-shadow: 0 0 0 4px #e6e6e6;
}

#result-data {
    padding: 18px;
}

.data-item {
    margin-bottom: 10px;
    font-size: 14px;
}

.label {
    font-weight: bold;
    display: block;
}

.footer-text {
    padding: 0 18px 18px;
    font-size: 12px;
    color: #333;
}

/* BOTTOM LINK */
.footer {
    text-align: center;
    margin-top: 8px;
    padding-bottom: 15px;
}

.footer a {
    text-decoration: none;
    font-weight: bold;
    color: black;
}

.hidden {
    display: none;
}
</style>
</head>

<body>

<div class="content-view">

    <!-- SEARCH -->
    <div class="search-card" id="search-box">
        <h3>Please search your e-document by filling the document number.</h3>

        <input type="text" id="certInput" placeholder="">
        <button class="search-btn" onclick="searchCert()">Search Certificate</button>
    </div>

    <!-- RESULT -->
    <div class="result-card hidden" id="result-box">

        <div class="top-area">
            <div class="status-circle">✓</div>
        </div>

        <div id="result-data"></div>

        <div class="footer-text">
            For any further information on this document, please contact the issuer of the document.
        </div>

    </div>

</div>

<!-- BOTTOM WEBSITE -->
<div class="footer">
    <a href="https://group.bureauveritas.com/" target="_blank">
        Visit Bureau Veritas Website
    </a>
</div>

<script>
async function searchCert() {
    const input = document.getElementById("certInput").value.trim();

    if (!input) {
        alert("Enter certificate number");
        return;
    }

    try {
        const res = await fetch("data.json");
        const data = await res.json();

        const result = data.find(item => item.id === input);

        if (result) {
            document.getElementById("search-box").classList.add("hidden");
            document.getElementById("result-box").classList.remove("hidden");

            document.getElementById("result-data").innerHTML = `
                <div class="data-item"><span class="label">Deliverable Id :</span> ${result.id}</div>
                <div class="data-item"><span class="label">Published on :</span> ${result.published}</div>
                <div class="data-item"><span class="label">QR Code Status :</span> <span style="color:green;">Validated</span></div>

                <div class="data-item"><span class="label">NAME :</span> ${result.name}</div>
                <div class="data-item"><span class="label">ID :</span> ${result.userId}</div>
                <div class="data-item"><span class="label">ISSUED ON :</span> ${result.issued}</div>
                <div class="data-item"><span class="label">VALID UNTIL :</span> ${result.valid}</div>
                <div class="data-item"><span class="label">TYPE :</span> ${result.type}</div>
                <div class="data-item"><span class="label">MODEL :</span> ${result.model}</div>
                <div class="data-item"><span class="label">COMPANY :</span> ${result.company}</div>
                <div class="data-item"><span class="label">TRAINING LOCATION :</span> ${result.location}</div>
                <div class="data-item"><span class="label">TRAINER :</span> ${result.trainer}</div>
            `;
        } else {
            alert("Certificate Not Found ❌");
        }

    } catch (err) {
        alert("Error loading data.json");
    }
}
</script>

</body>
</html>
